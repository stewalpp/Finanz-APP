<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Unsere Finanzen</title>
<script>try{var _t=localStorage.getItem('cf.theme');if(_t==='dark'||_t==='light'){document.documentElement.classList.add('theme-'+_t);}}catch(e){}</script>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F2F7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanzen">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <h1 id="page-title" class="large-title">Übersicht</h1>
    <div id="header-actions"></div>
  </div>
</header>
<main id="view-root"></main>
<button id="fab" class="fab" aria-label="Neue Buchung">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 5v14M5 12h14"/>
  </svg>
</button>
<nav class="tab-bar" id="tab-bar">
  <button class="tab-item active" data-tab="dashboard">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3.8 10.6 12 3.8l8.2 6.8"/>
      <path d="M5.8 9.3v10.3a1 1 0 0 0 1 1h10.4a1 1 0 0 0 1-1V9.3"/>
      <path d="M9.7 20.6v-5.3a1 1 0 0 1 1-1h2.6a1 1 0 0 1 1 1v5.3"/>
    </svg>
    <span>Übersicht</span>
  </button>
  <button class="tab-item" data-tab="personal">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="8" r="3.6"/>
      <path d="M5.5 20.2a6.5 6.5 0 0 1 13 0"/>
    </svg>
    <span>Persönlich</span>
  </button>
  <button class="tab-item" data-tab="transactions">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8.6 6.2H20"/>
      <path d="M8.6 12H20"/>
      <path d="M8.6 17.8H20"/>
      <path d="M4 6.2h.01"/>
      <path d="M4 12h.01"/>
      <path d="M4 17.8h.01"/>
    </svg>
    <span>Buchungen</span>
  </button>
  <button class="tab-item" data-tab="settings">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <span>Mehr</span>
  </button>
</nav>
<div id="sheet-root"></div>
<div id="toast-root"></div>
<script src="js/core.js"></script>
<script src="js/icons.js"></script>
<script src="js/charts.js"></script>
<script src="js/analysis.js"></script>
<script src="js/store.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/transactions.js"></script>
<script src="js/views/recurring.js"></script>
<script src="js/views/personal.js"></script>
<script src="js/views/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
